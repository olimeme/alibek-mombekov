<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>__NAME__</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #ffffff;
    --bg-hover: #f7f7f5;
    --bg-tag: #f1f1ef;
    --border: #e9e9e7;
    --text: #1a1a1a;
    --text-2: #6b6b6b;
    --text-3: #9b9b9b;
    --accent: #2563eb;
    --font: 'Inter', -apple-system, sans-serif;
  }
  [data-theme="dark"] {
    --bg: #191919;
    --bg-hover: #222222;
    --bg-tag: #2a2a2a;
    --border: #2f2f2f;
    --text: #e8e8e6;
    --text-2: #999996;
    --text-3: #5a5a57;
    --accent: #5b8ef0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    transition: background 0.2s, color 0.2s;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 40px 120px;
  }
  @media (max-width: 600px) {
    .page { padding: 32px 20px 80px; }
  }

  .topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 64px;
  }
  .theme-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    color: var(--text-2);
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .theme-btn:hover { background: var(--bg-hover); color: var(--text); }
  .theme-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }

  .avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--bg-tag);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 600;
    color: var(--text-2);
    margin-bottom: 24px;
    letter-spacing: -0.5px;
    user-select: none;
  }
  h1 {
    font-size: 36px; font-weight: 600;
    letter-spacing: -0.8px; line-height: 1.15;
    margin-bottom: 10px; color: var(--text);
  }
  .subtitle { font-size: 16px; color: var(--text-2); margin-bottom: 20px; font-weight: 400; }
  .meta-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--bg-tag); border-radius: 5px;
    padding: 4px 9px; font-size: 13px; color: var(--text-2);
    text-decoration: none; transition: background 0.15s, color 0.15s;
    border: 1px solid transparent;
  }
  .chip:hover { background: var(--bg-hover); color: var(--text); border-color: var(--border); }
  .chip svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; flex-shrink: 0; }
  .contact-line { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 48px; }
  .contact-link { font-size: 14px; color: var(--accent); text-decoration: none; }
  .contact-link:hover { text-decoration: underline; }
  .sep { color: var(--text-3); font-size: 14px; }

  hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

  .section { margin-bottom: 48px; }
  .section-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 20px;
  }

  .exp-row {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 16px 24px; padding: 14px 10px;
    border-radius: 8px; transition: background 0.12s;
    margin: 0 -10px;
  }
  .exp-row:hover { background: var(--bg-hover); }
  @media (max-width: 520px) { .exp-row { grid-template-columns: 1fr; gap: 4px; } }
  .exp-company { font-size: 14px; font-weight: 500; color: var(--text); }
  .exp-date { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .exp-location { font-size: 12px; color: var(--text-3); }
  .exp-role { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .exp-bullets { list-style: none; padding: 0; }
  .exp-bullets li {
    font-size: 14px; color: var(--text-2); line-height: 1.65;
    padding-left: 14px; position: relative; margin-bottom: 3px;
  }
  .exp-bullets li::before { content: '·'; position: absolute; left: 2px; color: var(--text-3); }
  .exp-bullets b { color: var(--text); font-weight: 500; }

  .skill-group { margin-bottom: 16px; }
  .skill-group-label { font-size: 13px; color: var(--text-2); margin-bottom: 8px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: var(--bg-tag); border-radius: 4px;
    padding: 3px 8px; font-size: 13px; color: var(--text-2);
    border: 1px solid var(--border); transition: background 0.12s, color 0.12s;
  }
  .tag:hover { background: var(--bg-hover); color: var(--text); }

  .project-row {
    display: flex; align-items: baseline;
    justify-content: space-between; gap: 16px;
    padding: 12px 10px; border-radius: 8px;
    transition: background 0.12s; margin: 0 -10px;
    text-decoration: none; color: inherit;
  }
  .project-row:hover { background: var(--bg-hover); }
  .project-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .project-desc { font-size: 13px; color: var(--text-2); margin-top: 2px; max-width: 480px; }
  .project-arrow { font-size: 13px; color: var(--text-3); flex-shrink: 0; }

  .edu-row {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 4px 24px; padding: 12px 10px;
    border-radius: 8px; transition: background 0.12s; margin: 0 -10px;
  }
  .edu-row:hover { background: var(--bg-hover); }
  @media (max-width: 520px) { .edu-row { grid-template-columns: 1fr; gap: 2px; } }
  .edu-date { font-size: 13px; color: var(--text-3); padding-top: 1px; }
  .edu-degree { font-size: 14px; font-weight: 500; color: var(--text); }
  .edu-school { font-size: 13px; color: var(--text-2); margin-top: 2px; }

  .cert-list { list-style: none; }
  .cert-list li {
    font-size: 14px; color: var(--text-2);
    padding: 6px 10px; border-radius: 6px;
    display: flex; align-items: center; gap: 8px;
    margin: 0 -10px; transition: background 0.12s;
  }
  .cert-list li:hover { background: var(--bg-hover); color: var(--text); }
  .cert-list li::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; margin-left: 2px; }

  .footer {
    padding-top: 40px;
    display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 8px;
  }
  .footer-left { font-size: 13px; color: var(--text-3); }
  .footer-links { display: flex; gap: 16px; }
  .footer-links a { font-size: 13px; color: var(--text-2); text-decoration: none; }
  .footer-links a:hover { color: var(--text); }
</style>
</head>
<body>
<div class="page">
__BODY__
</div>

<script>
function toggleTheme() {
  const root = document.documentElement;
  const isDark = root.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  root.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  document.getElementById('theme-label').textContent = isDark ? 'Dark' : 'Light';
}

function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  const root = document.documentElement;

  if (savedTheme) {
    root.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-label').textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
  }
}

document.addEventListener('DOMContentLoaded', initTheme);
</script>
</body>
</html>
